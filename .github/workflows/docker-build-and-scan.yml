# This reusable workflow can be used in repositories that include a Dockerfile to perform the following actions:
#  - Lint the Docker file via 'hadolint'.
#  - Build the Docker image.
#  - Optionally scan the Docker image for vulnerabilities via the 'Trivy' scanner (disabled by default).
#  - Optionally scan the Docker image for vulnerabilities via the 'Grype' scanner (disabled by default).
#  - Optionally upload Grype scan results as a SARIF report to GitHub Advanced Security (disabled by default).
#  - Optionally generate a Software Bill of Materials (SBOM) via 'Syft' (disabled by default).
#
# Note: Refer to the "inputs" section below to customize the behavior of the workflow.

name: Build & Scan Docker Image

on:
  workflow_call:
    inputs:
      dockerfile:
        required: false
        type: string
        default: 'Dockerfile'
        description: 'Path to the relevant Dockerfile'
      docker-build-args:
        required: false
        type: string
        default: '[]' # empty array
        description: Json-formatted array of strings to pass to the docker build command as build args. e.g. '["arg1", "arg2"]'
      execute-trivy-scan:
        required: false
        type: boolean
        default: false
        description: Execute Trivy vulnerability scanning of the Docker image
      vuln-types:
        required: false
        type: string
        default: 'os,library'
        description: Comma-separated list of vulnerability types to scan for. e.g. 'os,library'
      ignore-unfixed:
        required: false
        type: boolean
        default: false
        description: Ignore unfixed vulnerabilities
      severity:
        required: false
        type: string
        default: 'LOW,MEDIUM,HIGH,CRITICAL'
        description: Comma-separated list of vulnerability severities to scan for. e.g. 'LOW,MEDIUM,HIGH,CRITICAL'
      execute-grype-scan:
        required: false
        type: boolean
        default: false
        description: Execute Grype vulnerability scanning of the Docker image
      grype-fail-on-severity:
        required: false
        type: string
        default: 'high'
        description: Minimum vulnerability severity that causes Grype to fail the build (negligible, low, medium, high, critical)
      upload-sarif:
        required: false
        type: boolean
        default: false
        description: Upload Grype scan results as a SARIF report to the GitHub Advanced Security Dashboard. When enabled, the build will not fail on severity - findings are surfaced via GitHub Security instead.
      generate-sbom:
        required: false
        type: boolean
        default: false
        description: Generate a Software Bill of Materials (SBOM) using Syft after building the Docker image
      sbom-format:
        required: false
        type: string
        default: 'cyclonedx-json'
        description: Format for the generated SBOM (cyclonedx-json, spdx-json, syft-json)
      gcp-sbom-bucket:
        required: false
        type: string
        default: ''
        description: GCS bucket to upload the SBOM to. When set, the SBOM will be uploaded to gs://<gcp-sbom-bucket>/<github.repository>/<github.sha>/sbom-<dockerfile>.<sbom-format>. Requires gcp-workload-identity-provider and gcp-service-account to be set.
      gcp-workload-identity-provider:
        required: false
        type: string
        default: ''
        description: The workload identity provider to use for GCP authentication when uploading the SBOM to GCS.
      gcp-service-account:
        required: false
        type: string
        default: ''
        description: The service account to use for GCP authentication when uploading the SBOM to GCS.
      runs-on:
        required: false
        type: string
        default: 'ubuntu-latest'

permissions: {}

jobs:
  docker:
    name: Build & Scan Docker Image
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Check out code repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint docker file
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: '${{ inputs.dockerfile }}'

      - name: Prepare docker build args
        id: prepare-build-args
        run: |
          build_args='${{ inputs.docker-build-args }}'
          build_args=$(echo $build_args | jq -r '.[] | "--build-arg " + .' | xargs)
          echo "BUILD_ARGS=$build_args" >> $GITHUB_ENV
          dockerfile_safe=$(echo '${{ inputs.dockerfile }}' | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "SBOM_ARTIFACT_NAME=sbom-${dockerfile_safe}" >> $GITHUB_ENV

      - name: Build docker image
        id: build
        run: |
          repo_name=$(echo "${{ github.repository }}" | awk '{print tolower($0)}')
          echo "REPO_NAME=$repo_name" >> $GITHUB_ENV
          docker build $BUILD_ARGS -t $repo_name:latest -f ${{ inputs.dockerfile }} .

      - name: Run Trivy vulnerability scanner
        if: ${{ inputs.execute-trivy-scan }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: '${{ env.REPO_NAME }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: '${{ inputs.ignore-unfixed }}'
          vuln-type: '${{ inputs.vuln-types }}'
          severity: '${{ inputs.severity }}'

      - name: Run Grype vulnerability scanner
        if: ${{ inputs.execute-grype-scan && !inputs.upload-sarif }}
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: '${{ env.REPO_NAME }}:latest'
          fail-build: 'true'
          severity-cutoff: '${{ inputs.grype-fail-on-severity }}'
          output-format: 'table'

      - name: Run Grype vulnerability scanner and generate SARIF
        id: grype-sarif
        if: ${{ inputs.execute-grype-scan && inputs.upload-sarif }}
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: '${{ env.REPO_NAME }}:latest'
          fail-build: 'false'
          severity-cutoff: '${{ inputs.grype-fail-on-severity }}'
          output-format: 'sarif'

      - name: Upload Grype SARIF report to GitHub Advanced Security Dashboard
        if: ${{ inputs.execute-grype-scan && inputs.upload-sarif }}
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: ${{ steps.grype-sarif.outputs.sarif }}
          category: grype

      - name: Generate SBOM
        id: sbom
        if: ${{ inputs.generate-sbom }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: '${{ env.REPO_NAME }}:latest'
          format: '${{ inputs.sbom-format }}'
          artifact-name: '${{ env.SBOM_ARTIFACT_NAME }}'
          upload-artifact: true

      - name: Authenticate to GCP
        if: ${{ inputs.generate-sbom && inputs.gcp-sbom-bucket != '' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: '${{ inputs.gcp-workload-identity-provider }}'
          service_account: '${{ inputs.gcp-service-account }}'

      - name: Upload SBOM to GCS
        if: ${{ inputs.generate-sbom && inputs.gcp-sbom-bucket != '' }}
        uses: google-github-actions/upload-cloud-storage@6397bd7208e18d13ba2619ee21b9873edc94427a # v3.0.0
        with:
          path: '${{ steps.sbom.outputs.sbom }}'
          destination: '${{ inputs.gcp-sbom-bucket }}/${{ github.repository }}/${{ github.sha }}'
