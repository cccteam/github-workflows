name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:
  workflow_call:
    inputs:
      config-file:
        required: false
        type: string
        default: 'release-please-config.json'
        description: Path to the release-please config file
      manifest-file:
        required: false
        type: string
        default: '.release-please-manifest.json'
        description: Path to the release-please manifest file
    secrets:
      RELEASE_PLEASE_APP_ID:
        required: true
        description: GitHub App ID for authentication
      RELEASE_PLEASE_APP_PEM:
        required: true
        description: GitHub App private key for authentication

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PEM }}

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: ${{ inputs.config-file || 'release-please-config.json' }}
          manifest-file: ${{ inputs.manifest-file || '.release-please-manifest.json' }}
