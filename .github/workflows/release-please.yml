name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:
  workflow_call:
    inputs:
      config-file:
        required: false
        type: string
        default: 'release-please-config.json'
        description: Path to the release-please config file
      manifest-file:
        required: false
        type: string
        default: '.release-please-manifest.json'
        description: Path to the release-please manifest file
    secrets:
      RELEASE_PLEASE_APP_ID:
        required: true
        description: GitHub App ID for authentication
      RELEASE_PLEASE_APP_PEM:
        required: true
        description: GitHub App private key for authentication

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PEM }}

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: ${{ inputs.config-file || 'release-please-config.json' }}
          manifest-file: ${{ inputs.manifest-file || '.release-please-manifest.json' }}
